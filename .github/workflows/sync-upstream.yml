name: Sync upstream and merge feature branches

on:
  schedule:
    # Run daily at 08:00 UTC (16:00 Taiwan time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/anthropics/claude-plugins-official.git || true
          git fetch upstream
          git fetch origin

      - name: Sync main with upstream
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Merge main into voice-transcription branch
        id: merge-voice
        run: |
          git checkout feat/telegram-voice-transcription
          if git merge main --no-edit; then
            git push origin feat/telegram-voice-transcription
            echo "status=success" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Merge main into remote-approval branch
        id: merge-approval
        run: |
          git checkout feat/telegram-remote-approval
          if git merge main --no-edit; then
            git push origin feat/telegram-remote-approval
            echo "status=success" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Build deploy branch
        id: deploy
        run: |
          # Delete old deploy branch if exists
          git branch -D deploy 2>/dev/null || true
          git push origin --delete deploy 2>/dev/null || true

          # Create deploy from voice-transcription, then merge approval
          git checkout feat/telegram-voice-transcription
          git checkout -b deploy

          if git merge feat/telegram-remote-approval --no-edit; then
            git push origin deploy
            echo "status=success" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "status=conflict" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on conflict
        if: |
          steps.merge-voice.outputs.status == 'conflict' ||
          steps.merge-approval.outputs.status == 'conflict' ||
          steps.deploy.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const voice = '${{ steps.merge-voice.outputs.status }}';
            const approval = '${{ steps.merge-approval.outputs.status }}';
            const deploy = '${{ steps.deploy.outputs.status }}';

            let body = '## Upstream Sync Conflict\n\n';
            body += 'The following branches had merge conflicts:\n\n';
            if (voice === 'conflict') body += '- `feat/telegram-voice-transcription`\n';
            if (approval === 'conflict') body += '- `feat/telegram-remote-approval`\n';
            if (deploy === 'conflict') body += '- `deploy` (combining feature branches)\n';
            body += '\nPlease resolve manually:\n';
            body += '```bash\ncd ~/Documents/Hack/claude-plugins-official\n';
            body += 'git fetch origin\n';
            body += '# Fix conflicts in the affected branch(es)\n```';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream sync conflict — manual merge needed',
              body,
              labels: ['merge-conflict']
            });
